<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <base href="/media-website/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - University Email Announcement Portal</title>
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    
    <style>
        .forgot-password-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
        }

        .forgot-password-card {
            background-color: white;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            padding: var(--spacing-3xl);
            width: 90%;
            max-width: 400px;
        }

        .forgot-password-header {
            text-align: center;
            margin-bottom: var(--spacing-2xl);
        }

        .forgot-password-logo {
            font-size: 3rem;
            margin-bottom: var(--spacing-lg);
        }

        .forgot-password-title {
            font-size: var(--font-size-2xl);
            font-weight: var(--font-weight-bold);
            margin: 0 0 var(--spacing-md) 0;
            color: var(--text-primary);
        }

        .forgot-password-subtitle {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
            margin: 0;
            line-height: 1.5;
        }

        .forgot-password-form .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .forgot-password-form .form-label {
            color: var(--text-primary);
        }

        .forgot-password-form .form-control {
            width: 100%;
            padding: var(--spacing-md);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            font-size: var(--font-size-base);
        }

        .forgot-password-btn {
            width: 100%;
            padding: var(--spacing-md);
        }

        .forgot-password-message {
            padding: var(--spacing-md);
            border-radius: var(--radius-lg);
            margin-bottom: var(--spacing-lg);
            display: none;
        }

        .forgot-password-message.show {
            display: block;
        }

        .forgot-password-message.success {
            background-color: #dcfce7;
            border: 1px solid var(--success-color);
            color: #166534;
        }

        .forgot-password-message.error {
            background-color: #fee2e2;
            border: 1px solid var(--danger-color);
            color: #991b1b;
        }

        .forgot-password-links {
            text-align: center;
            margin-top: var(--spacing-lg);
            font-size: var(--font-size-sm);
        }

        .forgot-password-links a {
            color: var(--primary-color);
            text-decoration: none;
            display: inline-block;
            margin: 0 var(--spacing-md);
        }

        .forgot-password-links a:hover {
            text-decoration: underline;
        }

        .separator {
            text-align: center;
            color: var(--text-tertiary);
            margin: var(--spacing-lg) 0;
        }

        .loading-spinner {
            display: none;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: var(--spacing-md);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn.loading {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn.loading .loading-spinner {
            display: inline-block;
        }

        .btn.loading .btn-text {
            display: none;
        }
    </style>
</head>
<body>
    <div class="forgot-password-container">
        <div class="forgot-password-card">
            <div class="forgot-password-header">
                <div class="forgot-password-logo">🔑</div>
                <h1 class="forgot-password-title">Reset Password</h1>
                <p class="forgot-password-subtitle">
                    Enter your email and we'll send you a link to reset your password
                </p>
            </div>

            <div class="forgot-password-message" id="message"></div>

            <form class="forgot-password-form" id="forgot-form">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-control" 
                        placeholder="you@university.edu"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary forgot-password-btn" id="reset-btn">
                    <span class="loading-spinner"></span>
                    <span class="btn-text">Send Reset Link</span>
                </button>
            </form>

            <div class="separator">or</div>

            <div class="forgot-password-links">
                <a href="login.html">← Back to Login</a>
            </div>
        </div>
    </div>

    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <!-- Application Scripts -->
    <script src="../assets/js/firebase-config.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/utils.js"></script>

    <script>
        const forgotForm = document.getElementById('forgot-form');
        const emailInput = document.getElementById('email');
        const resetBtn = document.getElementById('reset-btn');
        const messageEl = document.getElementById('message');

        forgotForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();

            // Validation
            if (!email || !isValidEmail(email)) {
                showMessage('Please enter a valid email address', 'error');
                return;
            }

            // Show loading state
            setLoading(true);

            try {
                await sendPasswordResetEmail(email);
                showMessage(
                    `Password reset link sent to ${email}. Check your inbox (and spam folder) for the reset link.`,
                    'success'
                );
                emailInput.value = '';
                emailInput.disabled = true;
                resetBtn.disabled = true;
            } catch (error) {
                const message = getFirebaseErrorMessage(error);
                showMessage(message, 'error');
            } finally {
                setLoading(false);
            }
        });

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = 'forgot-password-message show ' + type;
        }

        function setLoading(isLoading) {
            resetBtn.disabled = isLoading;
            if (isLoading) {
                resetBtn.classList.add('loading');
            } else {
                resetBtn.classList.remove('loading');
            }
        }
    </script>
</body>
</html>
