<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Email Announcement Portal</title>
</head>
<body>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <script src="assets/js/firebase-config.js"></script>
    <script>
        // Route users to the correct page from Home
        function routeFromHome() {
            if (typeof isAuthenticated !== 'function' || typeof getUserRole !== 'function') {
                setTimeout(routeFromHome, 100);
                return;
            }

            const user = getCurrentUser ? getCurrentUser() : null;
            const role = getUserRole();

            if (!user) {
                window.location.href = './auth/login.html';
                return;
            }

            if (role === 'admin') {
                window.location.href = './admin/dashboard.html';
            } else {
                window.location.href = './user/dashboard.html';
            }
        }

        // Wait for auth observer result, then route
        window.addEventListener('authStateChanged', routeFromHome);
        setTimeout(routeFromHome, 400);
    </script>
</body>
</html>
