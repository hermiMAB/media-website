<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <base href="/media-website/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Submission - University Email Announcement Portal</title>
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    
    <style>
        body {
            background-color: var(--bg-tertiary);
        }

        .form-container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            box-shadow: var(--shadow-md);
        }

        .form-section {
            margin-bottom: var(--spacing-2xl);
        }

        .form-section-title {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-bold);
            margin-bottom: var(--spacing-lg);
            padding-bottom: var(--spacing-md);
            border-bottom: 1px solid var(--border-color);
        }

        .file-upload {
            border: 2px dashed var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-base);
        }

        .file-upload:hover {
            border-color: var(--primary-color);
            background-color: var(--bg-tertiary);
        }

        .file-upload.dragover {
            border-color: var(--primary-color);
            background-color: #e0f2fe;
        }

        .file-upload-icon {
            font-size: 2rem;
            margin-bottom: var(--spacing-md);
        }

        .file-upload-text {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
        }

        .file-list {
            margin-top: var(--spacing-lg);
            list-style: none;
            padding: 0;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-md);
            background-color: var(--bg-tertiary);
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-sm);
        }

        .file-item-info {
            flex: 1;
        }

        .file-item-name {
            font-weight: var(--font-weight-medium);
        }

        .file-item-size {
            font-size: var(--font-size-xs);
            color: var(--text-tertiary);
        }

        .file-item-remove {
            background: none;
            border: none;
            color: var(--danger-color);
            cursor: pointer;
            font-size: var(--font-size-lg);
        }

        .form-actions {
            display: flex;
            gap: var(--spacing-md);
            margin-top: var(--spacing-2xl);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--border-color);
        }

        .form-actions .btn {
            flex: 1;
            padding: var(--spacing-md) var(--spacing-lg);
        }

        .breadcrumb-nav {
            margin-bottom: var(--spacing-xl);
            font-size: var(--font-size-sm);
        }

        .breadcrumb-nav a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .breadcrumb-nav a:hover {
            text-decoration: underline;
        }

        .loading-spinner {
            display: none;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: var(--spacing-md);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn.loading {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn.loading .loading-spinner {
            display: inline-block;
        }

        .btn.loading .btn-text {
            display: none;
        }

        #file-input {
            display: none;
        }

        .upload-progress {
            display: none;
            margin-top: var(--spacing-md);
        }

        .upload-progress.show {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: var(--bg-tertiary);
            border-radius: var(--radius-full);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease-out;
        }

        .progress-text {
            font-size: var(--font-size-xs);
            color: var(--text-secondary);
            margin-top: var(--spacing-xs);
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="dashboard.html" class="navbar-brand">
                University Announcement Portal
            </a>
            <ul class="navbar-menu" id="navbar-menu">
                <li><a href="dashboard.html" class="navbar-link">Dashboard</a></li>
                <li><a href="my-submissions.html" class="navbar-link">My Submissions</a></li>
                <li><a href="profile.html" class="navbar-link">Profile</a></li>
                <li><a href="#" onclick="logoutUser(); return false;" class="navbar-link">Logout</a></li>
            </ul>
            <button class="navbar-toggle" onclick="toggleMenu()" style="display: none;">Menu</button>
        </div>
    </nav>

    <!-- Main Content -->
    <div style="padding: var(--spacing-xl);">
        <div class="container">
            <div class="breadcrumb-nav">
                <a href="dashboard.html">Dashboard</a> / <span>New Submission</span>
            </div>

            <div class="form-container">
                <h1 style="margin-bottom: var(--spacing-lg);">New Announcement</h1>

                <form id="submission-form">
                    <!-- Type Section -->
                    <div class="form-section">
                        <h3 class="form-section-title">Announcement Type</h3>
                        <div class="form-group">
                            <label class="form-label" for="type">Select Type *</label>
                            <select id="type" class="form-control" required>
                                <option value="">Choose announcement type...</option>
                                <option value="General Announcement">General Announcement</option>
                                <option value="Academic Notice">Academic Notice</option>
                                <option value="Event Invitation">Event Invitation</option>
                                <option value="Urgent Notice">Urgent Notice</option>
                                <option value="Club / Activity">Club / Activity</option>
                                <option value="Job / Opportunity">Job / Opportunity</option>
                            </select>
                        </div>
                    </div>

                    <!-- Details Section -->
                    <div class="form-section">
                        <h3 class="form-section-title">Announcement Details</h3>
                        
                        <div class="form-group">
                            <label class="form-label" for="subject">Subject *</label>
                            <input type="text" id="subject" class="form-control" placeholder="Enter announcement subject" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="body">Message *</label>
                            <textarea id="body" class="form-control" rows="8" placeholder="Enter full announcement message..." required></textarea>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="deadline">Deadline *</label>
                            <input type="datetime-local" id="deadline" class="form-control" required>
                        </div>
                    </div>

                    <!-- Document Upload Section -->
                    <div class="form-section">
                        <h3 class="form-section-title">Attachments (Optional)</h3>
                        
                        <div class="file-upload" id="file-upload-area">
                            <div class="file-upload-icon"></div>
                            <div class="file-upload-text">Drag and drop files here or click to browse</div>
                            <div style="font-size: var(--font-size-xs); color: var(--text-tertiary); margin-top: var(--spacing-sm);">
                                Max 10MB per file (PDF, DOC, DOCX, XLS, XLSX)
                            </div>
                        </div>
                        <input type="file" id="file-input" accept=".pdf,.doc,.docx,.xls,.xlsx">
                        
                        <div class="upload-progress" id="upload-progress">
                            <div class="progress-bar">
                                <div class="progress-fill" id="progress-fill"></div>
                            </div>
                            <div class="progress-text"><span id="progress-text">0%</span></div>
                        </div>

                        <ul class="file-list" id="file-list"></ul>
                    </div>

                    <!-- Error/Success Messages -->
                    <div class="alert alert-danger" id="error-message" style="display: none;"></div>
                    <div class="alert alert-success" id="success-message" style="display: none;"></div>

                    <!-- Actions -->
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="history.back()">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="submit-btn">
                            <span class="loading-spinner"></span>
                            <span class="btn-text">Submit for Approval</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Firebase & Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <script src="../assets/js/firebase-config.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/guard.js"></script>
    <script src="../assets/js/submissions.js"></script>
    <script src="../assets/js/storage.js"></script>
    <script src="../assets/js/utils.js"></script>

    <script>
        // Protect this page - wait for auth check
        protectPageAsFaculty().then((allowed) => {
            if (allowed) {
                setupForm();
            }
        });

        function setupForm() {
            const form = document.getElementById('submission-form');
            const typeSelect = document.getElementById('type');
            const fileUploadArea = document.getElementById('file-upload-area');
            const fileInput = document.getElementById('file-input');
            const fileList = document.getElementById('file-list');
            const uploadProgress = document.getElementById('upload-progress');
            const progressFill = document.getElementById('progress-fill');
            const progressText = document.getElementById('progress-text');
            const errorMessage = document.getElementById('error-message');
            let selectedFile = null;
        const submitBtn = document.getElementById('submit-btn');

        let uploadedFile = null;

        // Pre-fill type from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const typeParam = urlParams.get('type');
        if (typeParam) {
            typeSelect.value = typeParam;
        }

        // File upload handling
        fileUploadArea.addEventListener('click', () => fileInput.click());
        
        fileUploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileUploadArea.classList.add('dragover');
        });

        fileUploadArea.addEventListener('dragleave', () => {
            fileUploadArea.classList.remove('dragover');
        });

        fileUploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            fileUploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });

        function handleFileSelect(file) {
            // Validate file
            const maxSize = 10 * 1024 * 1024; // 10MB
            const validTypes = ['application/pdf', 'application/msword', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document', 'application/vnd.ms-excel', 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'];

            if (file.size > maxSize) {
                showError('File size exceeds 10MB limit');
                return;
            }

            uploadedFile = file;
            displayFileItem(file);
        }

        function displayFileItem(file) {
            const li = document.createElement('li');
            li.className = 'file-item';
            li.innerHTML = `
                <div class="file-item-info">
                    <div class="file-item-name">${file.name}</div>
                    <div class="file-item-size">${formatFileSize(file.size)}</div>
                </div>
                <button type="button" class="file-item-remove" onclick="removeFile()">Remove</button>
            `;
            fileList.innerHTML = '';
            fileList.appendChild(li);
        }

        function removeFile() {
            uploadedFile = null;
            fileList.innerHTML = '';
            uploadProgress.classList.remove('show');
            fileInput.value = '';
        }

        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const type = typeSelect.value;
            const subject = document.getElementById('subject').value.trim();
            const body = document.getElementById('body').value.trim();
            const deadline = document.getElementById('deadline').value;

            // Validation
            if (!type) {
                showError('Please select an announcement type');
                return;
            }

            if (!subject) {
                showError('Please enter a subject');
                return;
            }

            if (!body) {
                showError('Please enter the announcement message');
                return;
            }

            if (!deadline) {
                showError('Please set a deadline');
                return;
            }

            // Check deadline is in future
            if (new Date(deadline) <= new Date()) {
                showError('The deadline must be in the future');
                return;
            }

            setFormLoading(true);

            try {
                let documentUrl = '';
                let fileName = '';

                // Upload file if present
                if (uploadedFile) {
                    uploadProgress.classList.add('show');
                    const result = await uploadDocumentWithProgress(uploadedFile, `submission-`, (progress) => {
                        progressFill.style.width = progress + '%';
                        progressText.textContent = Math.round(progress) + '%';
                    });
                    documentUrl = result.url;
                    fileName = result.name;
                }

                // Create submission
                const submission = await createSubmission({
                    type: type,
                    subject: subject,
                    body: body,
                    deadline: deadline,
                    documentUrl: documentUrl,
                    fileName: fileName
                });

                showSuccess('Announcement submitted successfully!');
                setTimeout(() => {
                    window.location.href = `submission-success.html?id=${submission.id}`;
                }, 2000);

            } catch (error) {
                console.error('Submission error:', error);
                setFormLoading(false);
                showError(error.message || 'Failed to submit announcement');
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
        }

        function setFormLoading(isLoading) {
            submitBtn.disabled = isLoading;
            if (isLoading) {
                submitBtn.classList.add('loading');
            } else {
                submitBtn.classList.remove('loading');
            }
        }
        function toggleMenu() {
            const menu = document.getElementById('navbar-menu');
            menu.classList.toggle('active');
        }

        // Set default deadline to 1 week from now
        const now = new Date();
        now.setDate(now.getDate() + 7);
        document.getElementById('deadline').value = now.toISOString().slice(0, 16);
        } // Close setupForm function
    </script>
</body>
</html>
