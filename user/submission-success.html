<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!coment>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submission Successful - University Email Announcement Portal</title>
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    
    <style>
        body {
            background: linear-gradient(135deg, var(--success-color) 0%, #0f766e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: var(--spacing-lg);
        }

        .success-container {
            background-color: white;
            border-radius: var(--radius-xl);
            padding: var(--spacing-3xl);
            max-width: 500px;
            text-align: center;
            box-shadow: var(--shadow-xl);
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: var(--spacing-lg);
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .success-title {
            font-size: var(--font-size-2xl);
            font-weight: var(--font-weight-bold);
            color: var(--success-color);
            margin-bottom: var(--spacing-md);
        }

        .success-message {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-xl);
            line-height: 1.6;
        }

        .success-details {
            background-color: var(--bg-tertiary);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: var(--spacing-sm) 0;
            border-bottom: 1px solid var(--border-color);
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-weight: var(--font-weight-semibold);
            color: var(--text-secondary);
        }

        .detail-value {
            color: var(--text-primary);
        }

        .action-buttons {
            display: flex;
            gap: var(--spacing-md);
            flex-direction: column;
        }

        @media (min-width: 768px) {
            .action-buttons {
                flex-direction: row;
            }
        }

        .action-buttons .btn {
            flex: 1;
            padding: var(--spacing-md);
        }

        .countdown {
            font-size: var(--font-size-sm);
            color: var(--text-tertiary);
            margin-top: var(--spacing-lg);
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">OK</div>
        <h1 class="success-title">Submission Successful!</h1>
        
        <p class="success-message">
            Your announcement has been submitted and is awaiting admin review. 
            You can track its status anytime from your dashboard.
        </p>

        <div class="success-details">
            <div class="detail-row">
                <span class="detail-label">Submission ID</span>
                <span class="detail-value" id="submission-id">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Status</span>
                <span class="detail-value" style="color: var(--warning-color); font-weight: bold;">Pending Review</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Submitted at</span>
                <span class="detail-value" id="submitted-at">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Deadline</span>
                <span class="detail-value" id="deadline">-</span>
            </div>
        </div>

        <div class="action-buttons">
            <a href="dashboard.html" class="btn btn-secondary">Back to Dashboard</a>
            <a href="my-submissions.html" class="btn btn-primary">View All Submissions</a>
        </div>

        <div class="countdown">
            Redirecting in <span id="countdown">5</span>s...
        </div>
    </div>

    <!-- Firebase & Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <script src="../assets/js/firebase-config.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/guard.js"></script>
    <script src="../assets/js/submissions.js"></script>
    <script src="../assets/js/utils.js"></script>

    <script>
        // Protect this page - wait for auth check
        protectPageAsFaculty().then((allowed) => {
            if (allowed) {
                loadSubmissionDetails();
            }
        });

        async function loadSubmissionDetails() {
            const submissionId = getQueryParam('id');
            
            if (!submissionId) {
                console.error('No submission ID provided');
                return;
            }

            try {
                const submission = await getSubmission(submissionId);
                
                document.getElementById('submission-id').textContent = submission.id;
                document.getElementById('submitted-at').textContent = formatDateTime(submission.submittedAt);
                document.getElementById('deadline').textContent = formatDate(submission.deadline);
            } catch (error) {
                console.error('Error loading submission:', error);
            }
        }

        // Countdown timer
        let countdown = 5;
        setInterval(() => {
            countdown--;
            document.getElementById('countdown').textContent = countdown;
            if (countdown === 0) {
                window.location.href = 'my-submissions.html';
            }
        }, 1000);

        loadSubmissionDetails();
    </script>
</body>
</html>
